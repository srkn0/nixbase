# Dev runtimes and CLI tools — managed by mise, not nixpkgs.
# Run `mise install` after first login.
# Per-project overrides: add a .mise.toml to the project root.

[settings]
idiomatic_version_file_enable_tools = ["go", "node", "python"]
node.compile   = false
python.compile = false

[tools]
# --- language runtimes (per-project version switching via go.mod / .node-version / .python-version) ---
go     = "1.26.5"
node   = "24.18.0"
python = "3.14.6"
pnpm   = "11.17.0"

# --- Go tooling (version tied to Go release) ---
"golangci-lint" = "2.12.2"

# --- editor (bleeding-edge control) ---
neovim = "0.12.4"

# --- CI workflow ---
act = "0.2.89"

# --- kubernetes / IaC (version must match cluster / workspace state) ---
kubectl   = "1.36.2"
kind      = "0.32.0"
helm      = "4.2.3"
kustomize = "5.8.1"
terraform = "1.15.8"

# --- kubernetes dev tooling ---
stern     = "1.34.0"
kubecolor = "0.6.0"
krew      = "0.5.0"
devspace  = "6.3.19"
