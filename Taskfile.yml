version: "3"

vars:
  ISO_PATH: '{{.ISO_PATH | default (printf "%s/vm-isos/nixos-minimal-26.05.4808.569d57850992-x86_64-linux.iso" .HOME)}}'

tasks:
  setup-kvm:
    desc: One-time QEMU/KVM/libvirt/virt-manager setup for Ubuntu-on-WSL2 (needs a new shell session afterward)
    cmds:
      - ./scripts/setup-kvm-wsl.sh

  vm:bootstrap:
    desc: Tear down and recreate the nixos-test VM, install the vm-test flake target end-to-end
    env:
      ISO_PATH: "{{.ISO_PATH}}"
    cmds:
      - ./scripts/bootstrap-test-vm.sh

  vm:ssh:
    desc: SSH into the test VM
    cmds:
      - ssh nixos-test

  vm:destroy:
    desc: Stop and remove the test VM (disk included)
    cmds:
      - virsh -c qemu:///system destroy nixos-test 2>/dev/null || true
      - virsh -c qemu:///system undefine nixos-test --nvram 2>/dev/null || true
      - sudo rm -f /var/lib/libvirt/images/nixos-test.qcow2
